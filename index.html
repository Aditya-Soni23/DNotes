<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNotes | Login</title>

  <link rel="icon" href="Diamond_Comapny_Logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.15);
      filter: blur(120px);
      border-radius: 50%;
      animation: float 8s infinite alternate ease-in-out;
    }

    .blob.one { top: -100px; left: -100px; }
    .blob.two { bottom: -120px; right: -120px; animation-delay: 2s; }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 420px;
      padding: 2.8rem 2.5rem;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      text-align: center;
      color: #fff;
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: white;
      padding: 10px;
      margin: 0 auto 1.2rem;
    }

    .logo img { width: 100%; }

    h2 {
      margin: 0.5rem 0 0.4rem;
      font-weight: 700;
      font-size: 1.7rem;
    }

    p {
      margin-bottom: 2rem;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      color: #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .google-btn img { width: 22px; }

    /* 👻 ADMIN BUTTON (LOW VISIBILITY) */
    .admin-btn {
      margin-top: 10px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.35);
      font-size: 0.7rem;
      cursor: pointer;

    }

    .admin-btn:hover {
      color: rgba(255,255,255,0.6);
    }

    .footer-text {
      margin-top: 1.6rem;
      font-size: 0.75rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="blob one"></div>
  <div class="blob two"></div>

  <div class="login-card">
    <div class="logo">
      <img src="unnamed.png" alt="DNotes Logo">
    </div>

    <h2>Welcome to DNotes</h2>
    <p>Your secure cloud notebook.<br>Sign in to continue.</p>

    <button class="google-btn" id="loginBtn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/250px-Google_%22G%22_logo.svg.png">
      Sign in with Google
    </button>



    <div class="footer-text">
      © 2026 DNotes · Built for focus
    </div>
        <!-- 👻 Admin portal (almost invisible) -->
        <button class="admin-btn" id="adminBtn">admin portal</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    // Realtime Database Imports
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  
    const firebaseConfig = {
      apiKey: "AIzaSyBZTkOnUFqFdNAoK63dI2iCzDoykAjSylI",
      authDomain: "dnotes-cf9f2.firebaseapp.com",
      databaseURL: "https://dnotes-cf9f2-default-rtdb.firebaseio.com", // Double check this URL in your Firebase Console!
      projectId: "dnotes-cf9f2"
    };
  
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); 
    const provider = new GoogleAuthProvider();
  
    const ADMIN_EMAIL = "adityasonihyderabad@gmail.com";
  
    const handleLogin = async (isAdminAttempt = false) => {
  try {
    const result = await signInWithPopup(auth, provider);
    const email = result.user.email;
    const userKey = email.replace(/\./g, "_");

    localStorage.setItem("dnotes_user", userKey);

    // 1. Admin Check
    if (email === ADMIN_EMAIL) {
      window.location.href = isAdminAttempt ? "admin.html" : "notes.html";
      return;
    }

    // 2. Access Check
    try {
      const accessRef = ref(db, 'allowed_users/' + userKey);
      const snapshot = await get(accessRef);

      if (snapshot.exists()) {
        window.location.href = "notes.html";
      } else {
        throw new Error("not_allowed");
      }
    } catch (e) {
      // 3. Log Attempt & Redirect to Payment
      await set(ref(db, 'login_attempts/' + userKey), {
        email: email,
        timestamp: Date.now()
      });
      window.location.href = "payment.html";
    }

  } catch (err) {
    console.error("Login Error:", err);
    alert("Authentication failed. Please try again.");
  }
};
  
    document.getElementById("loginBtn").onclick = () => handleLogin(false);
    document.getElementById("adminBtn").onclick = () => handleLogin(true);
  </script>

</body>
</html>
